<svg
  viewBox="0 0 56 64"
  xmlns="http://www.w3.org/2000/svg"
  fill="currentColor"
  aria-hidden="true"
>
  <!--
    SplitFare-style S: two ribbon-receipt parallelograms, both leaning
    down-right. The upper piece sits in the upper-LEFT, the lower piece
    is offset right + down into the lower-RIGHT. They overlap in the
    middle; the back piece is darkened with a translucent black overlay
    so the overlap zone reads as a fold rather than a single bar.
  -->
  <!-- Back piece (lower-RIGHT of S), filled with currentColor… -->
  <path
    d="M 20 22
       L 44 22
       L 52 50
       L 50 52 L 48 50 L 46 52 L 44 50 L 42 52 L 40 50 L 38 52 L 36 50 L 34 52 L 32 50 L 30 52 L 28 50
       Z"
  />
  <!-- …then darkened so it reads as the back of the fold. -->
  <path
    fill="black"
    fill-opacity="0.25"
    d="M 20 22
       L 44 22
       L 52 50
       L 50 52 L 48 50 L 46 52 L 44 50 L 42 52 L 40 50 L 38 52 L 36 50 L 34 52 L 32 50 L 30 52 L 28 50
       Z"
  />
  <!-- Front piece (upper-LEFT of S), on top so it covers the overlap. -->
  <path
    d="M 4 4
       L 6 2 L 8 4 L 10 2 L 12 4 L 14 2 L 16 4 L 18 2 L 20 4 L 22 2 L 24 4 L 26 2 L 28 4
       L 36 32
       L 12 32
       Z"
  />
</svg>
