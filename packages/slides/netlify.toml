[build]
publish = "dist"
command = "pnpm build"
ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- packages/slides"

[build.environment]
NODE_VERSION = "22"

[[redirects]]
from = "/.well-known/*"
to = "/.well-known/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
