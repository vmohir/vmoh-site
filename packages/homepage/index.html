<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vahid Mohammadi</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f5f5f7;
            --fg: #1a1a1a;
            --muted: #6b6b70;
            --card-bg: #ffffff;
            --card-border: #e5e5ea;
            --accent: #0077b5;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #17171d;
                --fg: #f2f2f4;
                --muted: #9a9aa2;
                --card-bg: #1f1f26;
                --card-border: #2a2a30;
                --accent: #4fa8e0;
                --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            justify-content: center;
            padding: 12vh 1.5rem 3rem;
        }

        .page {
            width: 100%;
            max-width: 640px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            margin: 0 0 0.4rem;
            font-size: 1.75rem;
            font-weight: 600;
        }

        header p {
            margin: 0;
            color: var(--muted);
        }

        header a {
            color: var(--accent);
            text-decoration: none;
        }

        header a:hover {
            text-decoration: underline;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .app-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        .app-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .app-icon {
            flex: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: color-mix(in srgb, var(--accent) 14%, transparent);
            color: var(--accent);
            overflow: hidden;
        }

        .app-icon svg {
            width: 22px;
            height: 22px;
        }

        .app-icon--logo {
            background: none;
        }

        .app-icon--logo svg {
            width: 100%;
            height: 100%;
        }

        .app-text {
            min-width: 0;
        }

        .app-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .app-desc {
            margin: 0.15rem 0 0;
            font-size: 0.875rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>Vahid Mohammadi</h1>
            <p>Checkout my <a href="https://www.linkedin.com/in/vahidmohammadi/">LinkedIn</a></p>
        </header>

        <div class="apps">
            <a class="app-card" href="https://split.vmoh.ir">
                <span class="app-icon app-icon--logo">
                    <svg viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">

                    </svg>
                </span>
                <span class="app-text">
                    <div class="app-title">Split</div>
                    <p class="app-desc">Split a bill fairly between friends in seconds.</p>
                </span>
            </a>

            <a class="app-card" href="https://chooser.vmoh.ir">
                <span class="app-icon app-icon--logo">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

                        <circle cx="42" cy="42" r="9" fill="#f5f5f7" stroke="#f5f5f7" stroke-width="3"/>
                    </svg>
                </span>
                <span class="app-text">
                    <div class="app-title">Chooser</div>
                    <p class="app-desc">Tap with multiple fingers to pick who goes first.</p>
                </span>
            </a>

            <a class="app-card" href="https://slides.vmoh.ir">
                <span class="app-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                </span>
                <span class="app-text">
                    <div class="app-title">Slides</div>
                    <p class="app-desc">Decks and talks I've put together.</p>
                </span>
            </a>
        </div>
    </div>
</body>
</html>
