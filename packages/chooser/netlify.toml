[build]
  command = "pnpm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- packages/chooser pnpm-lock.yaml pnpm-workspace.yaml package.json"

# Override Netlify's default Permissions-Policy header — it lists several ad-
# tech features that current Chromium versions no longer recognise, which
# produces noisy console warnings.
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
